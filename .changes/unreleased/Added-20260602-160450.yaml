kind: Added
body: 'worktree: Add ''gs worktree create'', ''gs worktree list'', and ''gs worktree track'' commands. ''gs worktree create'' sets up a per-worktree trunk branch that tracks the remote trunk, so ''repo sync'' and restacks in different worktrees operate on their own trunk without contending on a shared checkout. ''gs worktree track'' adopts the trunk of a worktree created outside git-spice. Also adds ''-w/--worktree'' to ''log short'' and ''repo restack'' to scope operations to the current worktree''s stacks.'
