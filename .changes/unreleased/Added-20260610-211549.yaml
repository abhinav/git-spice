body: 'sync: Add `gs branch sync` (and `gs stack sync` / `gs upstack sync` / `gs downstack sync`) to pull remote-side commits added to a tracked branch since the last push. Default behavior is fast-forward only; use `--rebase` (or `spice.repoSync.pullBranches=rebase`) to integrate diverged branches.'
