version: 2
project_name: git-spice

release:
  prerelease: auto

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incminor .Tag }}-dev"

builds:
  - id: git-spice
    env:
      - CGO_ENABLED=0
    main: .
    binary: git-spice
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64, arm]
    goarm: ["5", "6", "7"]
    ldflags: '-s -w -X main._version={{.Version}}'
    ignore:
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm
    flags:
      - -trimpath

  # Keep Linux distro packages on a narrower target matrix than release
  # archives so package formats do not inherit every Linux ARM variant.
  - id: git-spice-linux-package
    env:
      - CGO_ENABLED=0
    main: .
    binary: git-spice
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags: '-s -w -X main._version={{.Version}}'
    flags:
      - -trimpath

archives:
  - ids: [git-spice]
    formats: tar.gz
    # uname compatible archive name.
    name_template: >-
      {{- .ProjectName }}.
      {{- title .Os }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else if (and (eq .Arch "arm64") (eq .Os "linux")) }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

nfpms:
  - ids: [git-spice-linux-package]
    package_name: git-spice
    file_name_template: "{{ .ConventionalFileName }}"
    homepage: "https://abhinav.github.io/git-spice/"
    maintainer: "Abhinav Gupta <mail@abhinavg.net>"
    description: "A tool for stacking Git branches."
    license: "GPL-3.0-or-later"
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    dependencies:
      - git
    contents:
      - src: ./LICENSE
        dst: /usr/share/licenses/git-spice/LICENSE
      - src: ./README.md
        dst: /usr/share/doc/git-spice/README.md
      - src: ./CHANGELOG.md
        dst: /usr/share/doc/git-spice/CHANGELOG.md

snapcrafts:
  - ids: [git-spice-linux-package]
    name: git-spice
    title: git-spice
    summary: A tool for stacking Git branches.
    description: >-
      git-spice helps you manage stacked Git branches, restack changes,
      and submit pull requests or merge requests for a stack.
    license: "GPL-3.0-or-later"
    confinement: classic
    grade: stable
    publish: true
    disable: '{{ ne (index .Env "ENABLE_SNAPCRAFT") "true" }}'
    apps:
      git-spice:
        command: git-spice

aurs:
  - name: git-spice-bin
    homepage: "https://abhinav.github.io/git-spice/"
    description: "A tool for stacking Git branches."
    maintainers:
      - 'Abhinav Gupta <mail@abhinavg.net>'
    license: "GPL-3.0-or-later"
    git_url: "ssh://aur@aur.archlinux.org/git-spice-bin.git"
    skip_upload: auto
    private_key: '{{ .Env.AUR_KEY }}'
    provides:
      - git-spice
    conflicts:
      - git-spice    # no non-bin package exists yet, but just in case
    package: |-
      install -Dm755 "./git-spice" "${pkgdir}/usr/bin/git-spice"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/git-spice/LICENSE"
      install -Dm644 "./README.md" "${pkgdir}/usr/share/doc/git-spice/README.md"
      install -Dm644 "./CHANGELOG.md" "${pkgdir}/usr/share/doc/git-spice/CHANGELOG.md"
    commit_author:
      name: Abhinav Gupta
      email: mail@abhinavg.net

homebrew_casks:
  - repository:
      owner: abhinav
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_msg_template: "{{ .ProjectName }}: Update formula to {{ .Tag }}"
    commit_author:
      name: Abhinav Gupta
      email: mail@abhinavg.net
    homepage: https://abhinav.github.io/git-spice/
    description: "A tool for stacking Git branches."
    license: "GPL-3.0-or-later"
    skip_upload: auto
    binaries: ["git-spice"]
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/git-spice"]
          end
