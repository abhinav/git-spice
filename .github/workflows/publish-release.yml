name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Version to release (e.g. v1.2.3).
          Uses latest version from changelog if unset.
        default: ''
        type: string
      ref:
        description: Git ref to release from.
        required: true
        type: string
      skip_goreleaser:
        description: Skip the GoReleaser publish step.
        required: false
        default: false
        type: boolean
      skip_homebrew:
        description: Skip the Homebrew formula bump step.
        required: false
        default: false
        type: boolean
      skip_ppa:
        description: Skip the Ubuntu PPA upload step.
        required: false
        default: false
        type: boolean
      ppa_revision:
        description: >-
          PPA package revision.
          Increase this to retry an upload for the same upstream version.
        required: false
        default: '1'
        type: string
      ppa_series:
        description: >-
          Comma-separated Ubuntu series for PPA publishing.
          Set this to resume a partial PPA upload.
        required: false
        default: noble,questing,resolute
        type: string
      ppa_source_date_epoch:
        description: >-
          Unix timestamp for reproducible PPA source package outputs.
          Leave unset to use the release ref commit timestamp.
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    environment: release

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        token: ${{ secrets.PAT }}

    - uses: jdx/mise-action@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set version (changie)
      if: inputs.version == ''
      run: |
        CHANGIE_VERSION=$(changie latest)
        echo "VERSION=${CHANGIE_VERSION#v}" >> "$GITHUB_ENV"
    - name: Set version (input)
      if: inputs.version != ''
      run:
        echo "VERSION=${INPUT_VERSION#v}" >> "$GITHUB_ENV"
      env:
        INPUT_VERSION: ${{ inputs.version }}

    - name: Verify version
      run: |
        if [[ -z "$VERSION" ]]; then
          echo "No version set"
          exit 1
        fi

    - name: Extract changelog
      run: |
        {
          tail -n+2 .changes/v${{ env.VERSION }}.md

          echo
          echo "---"
          echo
          echo "Thanks to the following sponsors for supporting this release:"
          cat SPONSORS.md
          echo
          echo "[Become a sponsor](https://github.com/sponsors/abhinav)"
        } > ${{ github.workspace }}-CHANGELOG.txt
        echo "::group::CHANGELOG"
        cat ${{ github.workspace }}-CHANGELOG.txt
        echo "::endgroup::"

    - name: Tag a release
      if: inputs.skip_goreleaser == false
      run: |
        git tag "$TAG"
        git push origin "$TAG"
      env:
        TAG: v${{ env.VERSION }}

    - name: Release
      if: inputs.skip_goreleaser == false
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: latest
        args: release --clean --release-notes ${{ github.workspace }}-CHANGELOG.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        AUR_KEY: ${{ secrets.AUR_KEY }}
        HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        GORELEASER_CURRENT_TAG: v${{ env.VERSION }}

  # Run only if the release was successful.
  homebrew:
    name: Bump Homebrew Formula
    runs-on: ubuntu-latest
    environment: release
    needs: [release]
    steps:
    - name: Check out repository
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}

    - uses: jdx/mise-action@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set version (changie)
      if: inputs.version == ''
      run: |
        CHANGIE_VERSION=$(changie latest)
        echo "VERSION=${CHANGIE_VERSION#v}" >> "$GITHUB_ENV"
    - name: Set version (input)
      if: inputs.version != ''
      run:
        echo "VERSION=${INPUT_VERSION#v}" >> "$GITHUB_ENV"
      env:
        INPUT_VERSION: ${{ inputs.version }}

    - name: Verify version
      run: |
        if [[ -z "$VERSION" ]]; then
          echo "No version set"
          exit 1
        fi

    - name: Update Homebrew Formula
      uses: dawidd6/action-homebrew-bump-formula@v7
      if: inputs.skip_homebrew == false
      with:
        token: ${{ secrets.ROBOT_PAT }}
        user_name: Abhinav Gupta
        user_email: "187913561+abhinav-robot@users.noreply.github.com"
        formula: git-spice
        tag: v${{ env.VERSION }}

  # Run only if the release was successful.
  ppa:
    name: Publish Ubuntu PPA
    runs-on: ubuntu-latest
    environment: release
    needs: [release]
    if: inputs.skip_ppa == false
    steps:
    - name: Check out repository
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}

    - uses: jdx/mise-action@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set version (changie)
      if: inputs.version == ''
      run: |
        CHANGIE_VERSION=$(changie latest)
        echo "VERSION=${CHANGIE_VERSION#v}" >> "$GITHUB_ENV"
    - name: Set version (input)
      if: inputs.version != ''
      run:
        echo "VERSION=${INPUT_VERSION#v}" >> "$GITHUB_ENV"
      env:
        INPUT_VERSION: ${{ inputs.version }}

    - name: Verify version
      run: |
        if [[ -z "$VERSION" ]]; then
          echo "No version set"
          exit 1
        fi

    - name: Install Debian upload tools
      run: |
        sudo apt-get update
        sudo apt-get install -y debhelper devscripts distro-info dput

    - name: Import Launchpad signing key
      run: |
        export GNUPGHOME="${RUNNER_TEMP}/gnupg"
        mkdir -p "$GNUPGHOME"
        chmod 700 "$GNUPGHOME"

        printf '%s' "$LAUNCHPAD_GPG_PRIVATE_KEY" \
          | gpg --batch --import

        echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
      env:
        LAUNCHPAD_GPG_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}

    - name: Publish source packages
      run: |
        args=(
          -version "v${VERSION}"
          -ref "${REF}"
          -series "${PPA_SERIES}"
          -ppa-revision "${PPA_REVISION}"
          -sign
          -dput
        )
        if [[ -n "$PPA_SOURCE_DATE_EPOCH" ]]; then
          args+=(-source-date-epoch "$PPA_SOURCE_DATE_EPOCH")
        fi

        go run ./tools/ci/launchpad-ppa "${args[@]}"
      env:
        LAUNCHPAD_GPG_KEY_ID: ${{ secrets.LAUNCHPAD_GPG_KEY_ID }}
        LAUNCHPAD_GPG_PASSPHRASE: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        PPA_REVISION: ${{ inputs.ppa_revision }}
        PPA_SERIES: ${{ inputs.ppa_series }}
        PPA_SOURCE_DATE_EPOCH: ${{ inputs.ppa_source_date_epoch }}
        REF: ${{ inputs.ref }}
